kind = "web"
previewPath = "/"
title = "What's Your Property Worth?"
version = "1.0.0"
id = "artifacts/property-worth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25884

[services.development]
run = "pnpm --filter @workspace/property-worth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/property-worth", "run", "build" ]
publicDir = "artifacts/property-worth/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25884"
BASE_PATH = "/"
